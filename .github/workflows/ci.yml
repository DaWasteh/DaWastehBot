name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Mindestrechte - dieser Workflow muss nichts schreiben.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Ruff installieren
        run: pip install ruff
      - name: Ruff Check
        run: ruff check pandabot.py config.py test_pandabot.py conftest.py
      - name: Ruff Format Check
        run: ruff format --check pandabot.py config.py test_pandabot.py conftest.py

  test:
    name: Import & Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # TwitchIO 3 verlangt mindestens Python 3.11.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Smoke-Test (Import & Kompilierung)
        env:
          # Dummy-Werte, damit die Pflicht-Konfiguration beim Import nicht meckert.
          TWITCH_CLIENT_ID: ci-dummy
          TWITCH_CLIENT_SECRET: ci-dummy
          TWITCH_BOT_ID: "0"
          TWITCH_OWNER_ID: "0"
        run: |
          python -m compileall pandabot.py config.py
          python -c "import pandabot; print('Import OK:', pandabot.PandaBot.__name__)"
      - name: Tests ausführen
        env:
          TWITCH_CLIENT_ID: ci-dummy
          TWITCH_CLIENT_SECRET: ci-dummy
          TWITCH_BOT_ID: "0"
          TWITCH_OWNER_ID: "0"
        run: pytest -q
